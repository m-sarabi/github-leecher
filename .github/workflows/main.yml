name: Download file in GitHub

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Enter the direct link:"
        required: true
        type: string
      zip_password:
        description: "Set a password:"
        required: true
        type: string
      split_size:
        description: 'Size of each archive chunk in MB:'
        default: '100'
        required: false
      archive_prefix:
        description: 'Prefix for archive name:'
        required: false
        type: string
        default: 'm-sarabi_'

permissions:
  contents: write

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout default branch (to access Git history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch all history so we can create an orphan branch correctly

      - name: Switch to orphan branch 'downloads'
        run: |
          git checkout --orphan downloads  2>/dev/null || git checkout downloads
          git rm -rf --quiet . || true     # clean the index (orphan branch starts empty)
          # If we just created the branch, we need to make an empty initial commit so it exists
          if ! git rev-parse --verify downloads^{commit} >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Initialize orphan branch for file chunks"
            git push origin downloads
          fi
          # Now we are on the 'downloads' branch, no files from other branches

      - name: Ensure 7z is available
        run: |
          if command -v 7z &> /dev/null; then
            echo "7z is already installed."
          else
            echo "Installing p7zip-full..."
            sudo apt-get update
            sudo apt-get install -y p7zip-full
          fi

      - name: Download file
        id: download_file
        run: |
          curl -LJO --fail --retry 3 "${{ github.event.inputs.file_url }}"
          # curl -J will use the filename from the header; we can detect the downloaded file
          DOWNLOADED_FILE=$(ls -t | head -1)   # crude but works in a clean workspace
          echo "downloaded_file_name=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT

      - name: Validate downloaded file
        run: |
          FILE="${{ steps.download_file.outputs.downloaded_file_name }}"
          if [ ! -f "$FILE" ]; then
            echo "Error: Downloaded file does not exist."
            exit 1
          fi
          size=$(stat -c%s "$FILE" 2>/dev/null || wc -c < "$FILE")
          if [ "$size" -eq 0 ]; then
            echo "Error: Downloaded file is empty."
            exit 1
          fi
          echo "File size: $size bytes"

      - name: Extract original filename and prepare for archive
        id: get_filename
        run: |
          DOWNLOADED_FILE="${{ steps.download_file.outputs.downloaded_file_name }}"
          ORIGINAL_URL="${{ github.event.inputs.file_url }}"

          # Extract filename from URL
          CLEAN_URL="${ORIGINAL_URL%%\?*}"
          CLEAN_URL="${CLEAN_URL%%#*}"
          FILENAME_FROM_URL=$(basename "$CLEAN_URL")
          if [[ -z "$FILENAME_FROM_URL" || "$FILENAME_FROM_URL" == "/" ]]; then
            FILENAME_FROM_URL="$DOWNLOADED_FILE" # If it was empty, use a default name
          fi
          
          # Separate base name and extension
          FILENAME_BASE=$(echo "$FILENAME_FROM_URL" | sed 's/\.[^.]*$//') # base name
          FILENAME_EXT="${FILENAME_FROM_URL##*.}" # extension

          # If extension was empty, leave it empty
          if [[ "$FILENAME_BASE" == "$FILENAME_FROM_URL" ]]; then
            FILENAME_EXT=""
          fi

          # prefix
          ARCHIVE_PREFIX="${{ github.event.inputs.archive_prefix }}"

          # Full base name
          FULL_ARCHIVE_NAME="${ARCHIVE_PREFIX}${FILENAME_BASE}"
          
          # Append file extension
          if [[ -n "$FILENAME_EXT" ]]; then
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}.${FILENAME_EXT}"
          else
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}"
          fi

          echo "Original file name: ${FILENAME_FROM_URL}"
          echo "Archive base name will be: ${FINAL_ARCHIVE_FILENAME}"

          # Outputs for later steps
          echo "archive_base_name=${FULL_ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "downloaded_file_name=${DOWNLOADED_FILE}" >> $GITHUB_OUTPUT
          echo "file_extension=${FILENAME_EXT}" >> $GITHUB_OUTPUT
          echo "final_archive_name=${FINAL_ARCHIVE_FILENAME}" >> $GITHUB_OUTPUT

      - name: Rename downloaded file
        id: rename_file
        run: |
          ARCHIVE_NAME_PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"
          DOWNLOADED_FILE="${{ steps.get_filename.outputs.downloaded_file_name }}"
          EXT="${{ steps.get_filename.outputs.file_extension }}"

          NEW_ORIGINAL_FILENAME="$ARCHIVE_NAME_PREFIX"
          if [[ -n "$EXT" ]]; then
            NEW_ORIGINAL_FILENAME="${ARCHIVE_NAME_PREFIX}.${EXT}"
          fi

          mv "$DOWNLOADED_FILE" "$NEW_ORIGINAL_FILENAME"
          echo "Renamed downloaded file to: $NEW_ORIGINAL_FILENAME"
          echo "new_original_filename=$NEW_ORIGINAL_FILENAME" >> $GITHUB_OUTPUT

      - name: Create encrypted split archive
        run: |
          ARCHIVE_NAME_PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"
          NEW_ORIGINAL_FILENAME="${{ steps.rename_file.outputs.new_original_filename }}"

          # Create multi-part, password-protected 7z archive
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v"${{ github.event.inputs.split_size }}"m "${ARCHIVE_NAME_PREFIX}.7z" "$NEW_ORIGINAL_FILENAME"

      - name: Remove original downloaded file
        run: |
          FILE="${{ steps.rename_file.outputs.new_original_filename }}"
          if [[ -n "$FILE" && -f "$FILE" ]]; then
            rm "$FILE"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push chunks
        run: |
          ARCHIVE_PREFIX_FOR_GIT="${{ steps.get_filename.outputs.archive_base_name }}"
          echo "Adding archive files matching pattern: ${ARCHIVE_PREFIX_FOR_GIT}.7z.*"

          git add "${ARCHIVE_PREFIX_FOR_GIT}.7z.*" || echo "No split 7z chunks found."
          git add "${ARCHIVE_PREFIX_FOR_GIT}.7z" || true

          echo "Added archive chunks to staging."

          if ! git diff --staged --quiet; then
            git commit -m "Add archive chunks for ${{ steps.get_filename.outputs.final_archive_name }}"
            echo "Committed all archive chunks."

            push_success=false
            max_attempts=15

            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt of $max_attempts to push all changes..."
              if git push origin HEAD; then
                echo "Push successful."
                push_success=true
                break
              else
                echo "Push failed on attempt $attempt. Will rebase onto remote changes and retry..."
                sleep 10
                git fetch origin || true
                if git rebase origin/HEAD; then
                  echo "Rebase succeeded, retrying push immediately."
                else
                  echo "Rebase failed! Aborting to avoid data loss."
                  exit 1
                fi
              fi
            done
            
            if [ "$push_success" = false ]; then
              echo "Push failed after $max_attempts attempts even with rebase. Aborting."
              exit 1
            fi
          else
            echo "No changes to commit or push."
          fi
